<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เพิ่มข้อมูลสถานที่ท่องเที่ยว</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .card { border-radius: 10px; }
        #map { height: 300px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>

<body>
<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4>เพิ่มข้อมูลสถานที่ท่องเที่ยว</h4>
        </div>

        <div class="card-body">
            <form>

                <div id="map"></div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Latitude</label>
                        <input type="text" id="lat" class="form-control" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Longitude</label>
                        <input type="text" id="lng" class="form-control" readonly>
                    </div>
                </div>

                <div class="mb-3">
                    <label>ชื่อสถานที่</label>
                    <input type="text" class="form-control" placeholder="กรอกชื่อสถานที่">
                </div>

                <div class="mb-3">
                    <label>รายละเอียด</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>ประเภทสถานที่</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>หน่วยงาน</label>
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>รูปภาพ</label>
                        <input type="file" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>ไฟล์เอกสาร</label>
                        <input type="file" class="form-control">
                    </div>
                </div>

                <button class="btn btn-success w-100">บันทึกข้อมูล</button>

            </form>
        </div>
    </div>
</div>

<script>
function initMap() {
    const start = { lat: 6.54, lng: 101.28 };

    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 13,
        center: start
    });

    let marker = new google.maps.Marker({
        position: start,
        map: map,
        draggable: true
    });

    map.addListener("click", (e) => {
        marker.setPosition(e.latLng);
        document.getElementById("lat").value = e.latLng.lat().toFixed(7);
        document.getElementById("lng").value = e.latLng.lng().toFixed(7);
    });

    marker.addListener("dragend", (e) => {
        document.getElementById("lat").value = e.latLng.lat().toFixed(7);
        document.getElementById("lng").value = e.latLng.lng().toFixed(7);
    });
}
</script>

<!-- ใส่ API KEY ของคุณ -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC5l0aPyGFqiqY5DpqOYf-8YhN_eYHHobU&callback=initMap" async defer></script>

</body>
</html>

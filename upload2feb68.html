<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตารางแสดงข้อมูล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>ตารางแสดงรายการท่องเที่ยวเชิงธรรมชาติ</h4>
        <a href="index.html" class="btn btn-primary">+ ย้อนไปเพิ่มข้อมูลอีกครั้ง</a>
    </div>

    <div class="table-responsive bg-white p-3 shadow-sm rounded">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>รูปภาพ</th>
                    <th>ชื่อสถานที่</th>
                    <th>รายละเอียด</th>
                    <th>พิกัด</th>
                    <th>ประเภท</th>
                    <th>ไฟล์</th>
                    <th>แก้ไข</th>
                    <th>ลบ</th>
                </tr>
            </thead>

            <tbody>
                <!-- แถวตัวอย่าง -->
                <tr>
                    <td>
                        <img src="uploads/sample.jpg" width="80" class="rounded">
                    </td>
                    <td>น้ำตกตัวอย่าง</td>
                    <td>สถานที่ท่องเที่ยวธรรมชาติสวยงาม</td>
                    <td><small>6.54,<br>101.28</small></td>
                    <td>
                        <span class="badge bg-info text-dark">ธรรมชาติ</span><br>
                        <small class="text-muted">เทศบาล</small>
                    </td>
                    <td>
                        <a href="#" class="btn btn-sm btn-outline-secondary">เปิดไฟล์</a>
                    </td>
                    <td>
                        <button class="btn btn-warning btn-sm">แก้ไข</button>
                    </td>
                    <td>
                        <button class="btn btn-danger btn-sm">ลบ</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>
</div>

</body>
</html>
